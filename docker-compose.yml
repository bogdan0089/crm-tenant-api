services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
        - db
    

